<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusHub | A jövő oktatása</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #00f2fe;
            --bg: #010409;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; perspective: 1500px; }
        .glow-sphere { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%); z-index: -1; pointer-events: none; }

        nav { position: fixed; top: 25px; display: flex; gap: 10px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 20px; border: 1px solid var(--border); backdrop-filter: blur(10px); z-index: 100; }
        nav button { background: transparent; border: none; color: white; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 11px; font-weight: 600; opacity: 0.5; transition: 0.3s; }
        nav button.active { background: var(--primary); opacity: 1; box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3); }

        .card { width: 450px; background: var(--glass); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 50px; padding: 40px; transform-style: preserve-3d; transition: transform 0.1s ease-out; box-shadow: 0 50px 100px rgba(0,0,0,0.5); }

        #content-area { min-height: 380px; display: flex; flex-direction: column; gap: 25px; transition: 0.4s; }

        .module-row { display: flex; justify-content: space-between; align-items: center; transform: translateZ(30px); }
        .circle-ui { width: 140px; height: 140px; border-radius: 50%; background: linear-gradient(135deg, #fff, var(--primary)); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; box-shadow: 0 0 30px rgba(99, 102, 241, 0.3); }
        .square-ui { width: 130px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 25px; padding: 15px; font-size: 11px; transform: translateZ(50px); }
        .liquid-panel { width: 100%; min-height: 80px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 20px; padding: 20px; font-size: 13px; line-height: 1.5; color: #cbd5e1; }
        
        .cta-action { width: 80px; height: 80px; background: white; border-radius: 50%; align-self: center; display: flex; justify-content: center; align-items: center; color: black; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .cta-action:hover { transform: scale(1.1) rotate(15deg); background: var(--accent); }

        .title-footer { text-align: center; font-size: 3.5rem; font-weight: 900; background: linear-gradient(to bottom, #fff, #444); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-top: 10px; }

        .info-list { list-style: none; margin-top: 10px; }
        .info-list li { font-size: 11px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; opacity: 0.8; }
        .info-list li span { color: var(--accent); }

        .fade { opacity: 0; transform: translateY(10px); }
    </style>
</head>
<body>

    <div class="glow-sphere" id="cursor-glow"></div>

    <nav>
        <button onclick="changePage('home')" id="btn-home" class="active">HOME</button>
        <button onclick="changePage('about')" id="btn-about">MI EZ?</button>
        <button onclick="changePage('stats')" id="btn-stats">ADATOK</button>
        <button onclick="changePage('contact')" id="btn-contact">KAPCSOLAT</button>
    </nav>

    <div class="card" id="main-card">
        <div id="content-area">
            </div>
        <h1 class="title-footer">FocusHub</h1>
    </div>

    <script>
        const contentArea = document.getElementById('content-area');
        
        const data = {
            home: {
                circle: "📖", circleSub: "STUDY",
                square: "<h4>V 2.6</h4><p>Rendszer aktív</p><div style='width:100%;height:3px;background:var(--primary);margin-top:10px'></div>",
                liquid: "Az Aron nem csak egy app. Egy mesterséges intelligencia alapú mentor, ami veled tanul.",
                btn: "GO"
            },
            about: {
                circle: "💡", circleSub: "MIÉRT?",
                square: "<h4>FÓKUSZ</h4><p>Zavaró tényezők nélkül</p>",
                liquid: "<ul class='info-list'><li><span>✔</span> Személyre szabott kvízek</li><li><span>✔</span> Játékszerű fejlődési rendszer</li><li><span>✔</span> Offline elérhető tananyag</li></ul>",
                btn: "INFÓ"
            },
            stats: {
                circle: "98%", circleSub: "SIKER",
                square: "<h4>120K</h4><p>Megoldott feladat</p>",
                liquid: "A felhasználóink 98%-a jobb jegyeket szerzett az első hónap után. Csatlakozz a közösséghez!",
                btn: "DATA"
            },
            contact: {
                circle: "✉", circleSub: "ÍRJ",
                square: "<h4>HELP</h4><p>24/7 ügyfélszolgálat</p>",
                liquid: "Kérdésed van? Hibát találtál? Vagy csak beköszönnél? Írj nekünk a support@aron.edu címre!",
                btn: "SEND"
            }
        };

        function changePage(pageKey) {

            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + pageKey).classList.add('active');

            contentArea.classList.add('fade');
            
            setTimeout(() => {
                const p = data[pageKey];
                contentArea.innerHTML = `
                    <div class="module-row">
                        <div class="circle-ui">
                            <span style="font-size:40px">${p.circle}</span>
                            <span style="font-size:10px; font-weight:900">${p.circleSub}</span>
                        </div>
                        <div class="square-ui">${p.square}</div>
                    </div>
                    <div class="liquid-panel">${p.liquid}</div>
                    <div class="cta-action">${p.btn}</div>
                `;
                contentArea.classList.remove('fade');
            }, 300);
        }


        const card = document.getElementById('main-card');
        const glow = document.getElementById('cursor-glow');

        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 30;
            const y = (window.innerHeight / 2 - e.clientY) / 30;
            card.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
            
            glow.style.left = (e.clientX - 300) + 'px';
            glow.style.top = (e.clientY - 300) + 'px';
        });

        changePage('home');
    </script>
</body>
</html>
